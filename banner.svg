<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Wave shapes -->
  <path d="M0,140 C200,100 400,160 600,130 C800,100 1000,150 1200,120 L1200,200 L0,200 Z" fill="url(#wave1)"/>
  <path d="M0,160 C150,130 350,170 550,150 C750,130 950,165 1200,145 L1200,200 L0,200 Z" fill="url(#wave2)"/>
  <path d="M0,175 C300,160 600,180 900,165 C1050,158 1150,170 1200,168 L1200,200 L0,200 Z" fill="#0d1117" opacity="0.6"/>

  <!-- Name -->
  <text x="600" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700"
        fill="#00d9ff" text-anchor="middle" letter-spacing="1">Durgashankar Puhan</text>

  <!-- Subtitle -->
  <text x="600" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400"
        fill="#ffffff" text-anchor="middle" opacity="0.85">Fullstack Developer &amp; AI Engineer</text>
</svg>
