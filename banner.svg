<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d0f2b"/>
      <stop offset="100%" style="stop-color:#020818"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="40%" style="stop-color:#6366f1"/>
      <stop offset="75%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1200" height="300" rx="0"/>
    </clipPath>
    <style>
      .dot { animation: pulse 3s ease-in-out infinite; }
      .dot:nth-child(2n) { animation-delay: 0.5s; }
      .dot:nth-child(3n) { animation-delay: 1s; }
      .dot:nth-child(5n) { animation-delay: 1.5s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.55; }
      }
      .circuit-line { animation: lineFade 4s ease-in-out infinite; }
      .circuit-line:nth-child(2n) { animation-delay: 1s; }
      .circuit-line:nth-child(3n) { animation-delay: 2s; }
      @keyframes lineFade {
        0%, 100% { opacity: 0.08; }
        50% { opacity: 0.25; }
      }
      .float1 { animation: float1 6s ease-in-out infinite; }
      .float2 { animation: float2 8s ease-in-out infinite; }
      @keyframes float1 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(10px); }
      }
      .shimmer { animation: shimmer 3s ease-in-out infinite; }
      @keyframes shimmer {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .badge-anim { animation: badgePulse 2.5s ease-in-out infinite; }
      .badge-anim:nth-child(2n) { animation-delay: 0.8s; }
      .badge-anim:nth-child(3n) { animation-delay: 1.6s; }
      @keyframes badgePulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      .scanline { animation: scan 8s linear infinite; }
      @keyframes scan {
        0% { transform: translateY(-300px); }
        100% { transform: translateY(300px); }
      }
    </style>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="1200" height="300" fill="url(#bgGrad)"/>

    <!-- Ambient orbs -->
    <ellipse cx="180" cy="150" rx="200" ry="160" fill="url(#orb1Grad)" class="float1"/>
    <ellipse cx="1050" cy="140" rx="220" ry="170" fill="url(#orb2Grad)" class="float2"/>
    <ellipse cx="600" cy="280" rx="300" ry="80" fill="#6366f1" opacity="0.04"/>

    <!-- Circuit grid lines - horizontal -->
    <line x1="0" y1="60" x2="320" y2="60" stroke="#6366f1" stroke-width="0.5" class="circuit-line"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#a855f7" stroke-width="0.5" class="circuit-line"/>
    <line x1="0" y1="180" x2="280" y2="180" stroke="#6366f1" stroke-width="0.5" class="circuit-line"/>
    <line x1="0" y1="240" x2="160" y2="240" stroke="#a855f7" stroke-width="0.5" class="circuit-line"/>
    <line x1="880" y1="60" x2="1200" y2="60" stroke="#22d3ee" stroke-width="0.5" class="circuit-line"/>
    <line x1="920" y1="120" x2="1200" y2="120" stroke="#34d399" stroke-width="0.5" class="circuit-line"/>
    <line x1="860" y1="180" x2="1200" y2="180" stroke="#22d3ee" stroke-width="0.5" class="circuit-line"/>
    <line x1="950" y1="240" x2="1200" y2="240" stroke="#34d399" stroke-width="0.5" class="circuit-line"/>

    <!-- Circuit grid lines - vertical -->
    <line x1="80" y1="0" x2="80" y2="160" stroke="#6366f1" stroke-width="0.5" class="circuit-line"/>
    <line x1="160" y1="60" x2="160" y2="300" stroke="#a855f7" stroke-width="0.5" class="circuit-line"/>
    <line x1="240" y1="0" x2="240" y2="120" stroke="#6366f1" stroke-width="0.5" class="circuit-line"/>
    <line x1="1040" y1="0" x2="1040" y2="240" stroke="#22d3ee" stroke-width="0.5" class="circuit-line"/>
    <line x1="1120" y1="60" x2="1120" y2="300" stroke="#34d399" stroke-width="0.5" class="circuit-line"/>

    <!-- Circuit dots (intersections) -->
    <circle cx="80" cy="60" r="2.5" fill="#a855f7" class="dot"/>
    <circle cx="160" cy="60" r="2" fill="#6366f1" class="dot"/>
    <circle cx="160" cy="120" r="2.5" fill="#a855f7" class="dot"/>
    <circle cx="160" cy="180" r="2" fill="#6366f1" class="dot"/>
    <circle cx="80" cy="120" r="2" fill="#a855f7" class="dot"/>
    <circle cx="240" cy="60" r="2.5" fill="#6366f1" class="dot"/>
    <circle cx="240" cy="120" r="2" fill="#a855f7" class="dot"/>
    <circle cx="1040" cy="60" r="2.5" fill="#22d3ee" class="dot"/>
    <circle cx="1040" cy="120" r="2" fill="#34d399" class="dot"/>
    <circle cx="1040" cy="180" r="2.5" fill="#22d3ee" class="dot"/>
    <circle cx="1120" cy="60" r="2" fill="#34d399" class="dot"/>
    <circle cx="1120" cy="120" r="2.5" fill="#22d3ee" class="dot"/>
    <circle cx="1120" cy="180" r="2" fill="#34d399" class="dot"/>
    <circle cx="1120" cy="240" r="2.5" fill="#22d3ee" class="dot"/>

    <!-- Left decorative hex/bracket shape -->
    <g class="float1" opacity="0.5" filter="url(#glow2)">
      <polygon points="55,90 75,80 95,90 95,110 75,120 55,110" fill="none" stroke="#a855f7" stroke-width="1"/>
      <polygon points="60,92 75,84 90,92 90,108 75,116 60,108" fill="#a855f7" opacity="0.08"/>
      <circle cx="75" cy="100" r="4" fill="#a855f7" opacity="0.6"/>
    </g>

    <!-- Right decorative diamond -->
    <g class="float2" opacity="0.5" filter="url(#glow2)">
      <polygon points="1125,70 1145,90 1125,110 1105,90" fill="none" stroke="#22d3ee" stroke-width="1"/>
      <polygon points="1125,76 1139,90 1125,104 1111,90" fill="#22d3ee" opacity="0.08"/>
      <circle cx="1125" cy="90" r="4" fill="#22d3ee" opacity="0.6"/>
    </g>

    <!-- Floating code snippets - left -->
    <g opacity="0.18" class="float1">
      <text x="20" y="210" font-family="'Courier New', monospace" font-size="10" fill="#a855f7">&lt;AI</text>
      <text x="20" y="223" font-family="'Courier New', monospace" font-size="10" fill="#6366f1">Engineer</text>
      <text x="20" y="236" font-family="'Courier New', monospace" font-size="10" fill="#a855f7">/&gt;</text>
    </g>

    <!-- Floating code snippets - right -->
    <g opacity="0.18" class="float2">
      <text x="1060" y="210" font-family="'Courier New', monospace" font-size="10" fill="#22d3ee">{ build:</text>
      <text x="1060" y="223" font-family="'Courier New', monospace" font-size="10" fill="#34d399">  scale,</text>
      <text x="1060" y="236" font-family="'Courier New', monospace" font-size="10" fill="#22d3ee">}</text>
    </g>

    <!-- Scanline effect -->
    <rect x="0" y="0" width="1200" height="2" fill="white" opacity="0.015" class="scanline"/>

    <!-- Horizontal divider line animated -->
    <rect x="300" y="148" width="600" height="0.6" fill="url(#lineGrad1)" class="shimmer"/>

    <!-- Main name text with gradient -->
    <text
      x="600" y="118"
      text-anchor="middle"
      font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
      font-size="62"
      font-weight="900"
      letter-spacing="-1"
      fill="url(#nameGrad)"
      filter="url(#glow1)"
    >Durgashankar Puhan</text>

    <!-- Subtitle text -->
    <text
      x="600" y="170"
      text-anchor="middle"
      font-family="'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="17"
      font-weight="400"
      letter-spacing="3"
      fill="#94a3b8"
    >FULLSTACK DEVELOPER  ·  AI ENGINEER  ·  INDIA 🇮🇳</text>

    <!-- Tech badge pills at bottom -->
    <g class="badge-anim">
      <rect x="338" y="210" width="90" height="22" rx="11" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="383" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#c084fc" letter-spacing="1">REACT</text>
    </g>
    <g class="badge-anim">
      <rect x="438" y="210" width="90" height="22" rx="11" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="483" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#818cf8" letter-spacing="1">NODE.JS</text>
    </g>
    <g class="badge-anim">
      <rect x="538" y="210" width="120" height="22" rx="11" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="598" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#38bdf8" letter-spacing="1">LANGCHAIN</text>
    </g>
    <g class="badge-anim">
      <rect x="668" y="210" width="90" height="22" rx="11" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="713" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#67e8f9" letter-spacing="1">DOCKER</text>
    </g>
    <g class="badge-anim">
      <rect x="768" y="210" width="90" height="22" rx="11" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="813" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#6ee7b7" letter-spacing="1">KAFKA</text>
    </g>

    <!-- Bottom tagline -->
    <text
      x="600" y="265"
      text-anchor="middle"
      font-family="'Courier New', monospace"
      font-size="11"
      fill="#475569"
      letter-spacing="1"
    >// architecting experiences, one system at a time</text>

    <!-- Corner accent lines TL -->
    <line x1="0" y1="0" x2="40" y2="0" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <!-- Corner accent lines TR -->
    <line x1="1200" y1="0" x2="1160" y2="0" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <line x1="1200" y1="0" x2="1200" y2="40" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <!-- Corner accent lines BL -->
    <line x1="0" y1="300" x2="40" y2="300" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="300" x2="0" y2="260" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <!-- Corner accent lines BR -->
    <line x1="1200" y1="300" x2="1160" y2="300" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <line x1="1200" y1="300" x2="1200" y2="260" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
